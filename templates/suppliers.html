{% extends "base.html" %}
{% block title %}Suppliers — AlokSaar{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <span class="eyebrow">Suppliers</span>
    <h1 class="page-title">Your connected suppliers.</h1>
    <p class="page-subtitle">From your uploaded data. New supplier discovery is coming in a future update.</p>
  </div>
</div>
<div class="grid grid-3" id="suppliers-grid"></div>
{% endblock %}
{% block scripts %}
<script>
async function loadSuppliers() {
  const res = await fetch("/api/suppliers");
  const suppliers = await res.json();
  const grid = document.getElementById("suppliers-grid");
  if (!suppliers.length) {
    grid.innerHTML = `<div class="card"><div class="empty-state">No suppliers yet. Upload suppliers.csv to get started.</div></div>`;
    return;
  }
  grid.innerHTML = suppliers.map(s => `
    <div class="card">
      <div class="card-label">${s.name}</div>
      <div class="stat-value" style="font-size:20px;">${s.medicine_count} medicine${s.medicine_count === 1 ? '' : 's'}</div>
      <div class="stat-delta" style="color:var(--ink-60);">Reliability: ${s.reliability_score}/5 · ${s.avg_delivery_days}-day delivery</div>
      <div class="stat-delta" style="color:var(--ink-60); margin-top:8px;">${s.order_count} orders · ₹${s.total_spend.toLocaleString('en-IN')} total spend</div>
    </div>
  `).join("");
}
loadSuppliers();
</script>
{% endblock %}
